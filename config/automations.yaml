- id: '1763435782981'
  alias: rfid_tag
  description: ''
  triggers:
  - tag_id: 14-14-7E-A7
    trigger: tag
  - tag_id: AB-CE-BF-1B
    trigger: tag
  - tag_id: 63-91-29-21
    trigger: tag
  conditions: []
  actions:
  - variables:
      tag_hugo: 14-14-7E-A7
      tag_lolo: AB-CE-BF-1B
      tag_admin: 63-91-29-21
      mode_proyector: TvProyector
      mode_cocina: TvCocina
      target_counter: "{% set tag = trigger.event.data.tag_id %}\n{% if tag == tag_lolo
        %}\n  counter.credito_lolo\n{% elif tag == tag_hugo %}\n  counter.credito_hugo\n{%
        else %}\n  none\n{% endif %}\n"
      titular_name: "{% set tag = trigger.event.data.tag_id %}\n{% if tag == tag_lolo
        %}\n  Lolo\n{% elif tag == tag_hugo %}\n  Hugo\n{% else %}\n  Desconocido\n{%
        endif %}\n"
      is_admin_tag: '{{ trigger.event.data.tag_id == tag_admin }}'
      current_mode: '{{ states(''input_select.rfid_selector'') }}'
      target_timer: "{% if current_mode == mode_proyector %}\n  timer.timer_tvproyector\n{%
        elif current_mode == mode_cocina %}\n  timer.timer_tvcocina\n{% else %}\n
        \ timer.timer_tvcocina\n{% endif %}\n"
      target_switch: "{% if current_mode == mode_cocina %}\n  switch.enchufe_tv_socket_1\n{%
        elif current_mode == mode_proyector %}\n  switch.audio_socket_1\n{% else %}\n
        \ none\n{% endif %}\n"
  - if:
    - condition: template
      value_template: '{{ is_admin_tag }}'
    then:
    - if:
      - condition: template
        value_template: '{{ target_switch != ''none'' }}'
      then:
      - data:
          value: Me:d=4,o=5,b=200:g#,32p,g#,g,f,g,1p,g,g,g#,a#,d#,0p,c,2d#,32p,f,g,2f,32p,d#,d,2d#,2p
        target:
          entity_id: text.lectorrfid_melodia_buzzer_rtttl
        action: text.set_value
      - target:
          entity_id: button.lectorrfid_parpadeo_corto
        action: button.press
        data: {}
      - data:
          value: '{% set toggled_state = states(target_switch) %} {% set new_state
            = ''off'' if toggled_state == ''on'' else ''on'' %} {{ current_mode }}:
            {{ new_state }}'
        target:
          entity_id: text.lectorrfid_mensaje_pantalla_lcd
        action: text.set_value
      - target:
          entity_id: '{{ target_switch }}'
        action: switch.toggle
        data: {}
      - target:
          entity_id: button.lectorrfid_buzzer
        action: button.press
        data: {}
      else:
      - target:
          entity_id: button.lectorrfid_parpadeo_largo
        action: button.press
        data: {}
      - data:
          value: Modo Admin:;Sin switch
        target:
          entity_id: text.lectorrfid_mensaje_pantalla_lcd
        action: text.set_value
    else:
    - if:
      - condition: template
        value_template: '{{ target_counter != ''none'' }}'
      then:
      - if:
        - condition: template
          value_template: '{{ current_mode == mode_proyector or current_mode == mode_cocina
            }}

            '
        then:
        - if:
          - condition: template
            value_template: '{{ states(target_counter) | int > 0 }}'
          then:
          - target:
              entity_id: button.lectorrfid_parpadeo_corto
            action: button.press
            data: {}
          - target:
              entity_id: '{{ target_counter }}'
            action: counter.decrement
            data: {}
          - variables:
              display_time_seconds: "{% set finish_time = state_attr(target_timer,
                'finishes_at') %} {% if finish_time and is_state(target_timer, 'active')
                %}\n  {% set time_left_td = (as_datetime(finish_time) - now()) %}\n
                \ {% set total_seconds = time_left_td.total_seconds() + 1800 %}\n
                \ {{ [0, total_seconds] | max | int }}\n{% else %}\n  1800\n{% endif
                %}\n"
              new_duration: '{% set total_seconds = display_time_seconds | int %}
                {% set hours = (total_seconds // 3600) | int %} {% set minutes = ((total_seconds
                % 3600) // 60) + 1 | int %} {{ "%02i:%02i" | format(hours, minutes)
                }}

                '
          - data:
              duration: '{{ new_duration }}'
            target:
              entity_id: '{{ target_timer }}'
            action: timer.start
          - data:
              value: '{{ new_duration + ";" + titular_name + ": " + states(target_counter)
                }}'
            target:
              entity_id: text.lectorrfid_mensaje_pantalla_lcd
            action: text.set_value
          - data:
              value: Wonderboy:d=4,o=5,b=225:f6,d6,f6,8d6,f6,32p,8f6,d6,f6,d6,e6,c6,e6,8c6,e6,32p,8e6,c6,e6,c6
            target:
              entity_id: text.lectorrfid_melodia_buzzer_rtttl
            action: text.set_value
          - target:
              entity_id: button.lectorrfid_buzzer
            action: button.press
            data: {}
          else:
          - target:
              entity_id: button.lectorrfid_parpadeo_largo
            action: button.press
            data: {}
          - data:
              value: '{{ titular_name + '':;Sin saldo'' }}'
            target:
              entity_id: text.lectorrfid_mensaje_pantalla_lcd
            action: text.set_value
        else:
        - data:
            value: '{{ ''Saldo '' + titular_name + '': ;'' + states(target_counter)
              }}'
          target:
            entity_id: text.lectorrfid_mensaje_pantalla_lcd
          action: text.set_value
      else:
      - data:
          value: Tag Desconocido
        target:
          entity_id: text.lectorrfid_mensaje_pantalla_lcd
        action: text.set_value
      - target:
          entity_id: button.lectorrfid_parpadeo_largo
        action: button.press
        data: {}
  mode: single
