- id: '1753841890398'
  alias: Registrar Última Vez que Dejó de Llover (Met.no)
  description: 'Actualiza el helper ''LastRain'' cuando la entidad de pronóstico de
    Met.no cambia de un estado de lluvia a un estado sin lluvia.

    '
  triggers:
  - entity_id: weather.forecast_tu_ubicacion
    from:
    - rainy
    - pouring
    - lightning-rainy
    - snowy-rainy
    - hail
    to:
    - sunny
    - clear-night
    - cloudy
    - partlycloudy
    - fog
    - windy
    - windy-variant
    trigger: state
  actions:
  - target:
      entity_id: input_datetime.last_rain
    data:
      datetime: '{{ now() }}'
    action: input_datetime.set_datetime
  mode: single
