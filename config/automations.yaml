- id: '1763865962905'
  alias: RFID_Selector_change
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.rfid_selector
  conditions: []
  actions:
  - variables:
      timer_entity_id: "{% set mode = trigger.to_state.state %} {% if mode == 'TvProyector'
        %}\n  timer.timer_tvproyector\n{% elif mode == 'TvCocina' %}\n  timer.timer_tvcocina\n{%
        else %}\n  none\n{% endif %}\n"
      timer_display_name: "{% set mode = trigger.to_state.state %} {% if mode == 'TvProyector'
        %}\n  Proyector\n{% elif mode == 'TvCocina' %}\n  TV Cocina\n{% else %}\n
        \ {{ mode }}\n{% endif %}\n"
      time_left_seconds: "{% set finish_time = state_attr(timer_entity_id, 'finishes_at')
        %}  {% if finish_time and is_state(timer_entity_id, 'active') %}\n  {% set
        time_left_td = (as_datetime(finish_time) - now()) %}\n  {{ [0, time_left_td.total_seconds()]
        | max | int(default=0) }}\n{% else %}\n  0\n{% endif %}\n"
  - if:
    - condition: template
      value_template: '{{ trigger.to_state.state == ''TvProyector'' or trigger.to_state.state
        == ''TvCocina'' }}

        '
    then:
    - data:
        value: '{% set total_seconds = time_left_seconds | int(default=0) %}  {% set
          hours = (total_seconds // 3600) | int %}  {% set minutes = ((total_seconds
          % 3600) // 60) | int %}

          {{ timer_display_name + ":;%02i:%02i" | format(hours, minutes) }}

          '
      target:
        entity_id: text.lectorrfid_mensaje_pantalla_lcd
      action: text.set_value
    else:
    - action: text.set_value
      data:
        value: '{{ trigger.to_state.state }}'
      target:
        entity_id: text.lectorrfid_mensaje_pantalla_lcd
  mode: single
