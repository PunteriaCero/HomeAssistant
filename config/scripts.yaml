              data:
                device_ip: '{{ device_ip }}'
              response_variable: pause_result
            
            - variables:
                media_result: "{{ media_result | combine({'status': 'completed', 'action': 'pause', 'response': pause_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "⏸️ Pausa activada"
                message: |
                  ✅ Acción: {{ media_result.action | upper }}
                  📍 Dispositivo: {{ media_result.device_ip }}
                  📊 Respuesta: {{ media_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== EXIT ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "exit" }}'
          sequence:
            - action: rest_command.adb_exit_app
              data:
                device_ip: '{{ device_ip }}'
              response_variable: exit_result
            
            - variables:
                media_result: "{{ media_result | combine({'status': 'completed', 'action': 'exit', 'response': exit_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "❌ Aplicación cerrada"
                message: |
                  ✅ Acción: {{ media_result.action | upper }}
                  📍 Dispositivo: {{ media_result.device_ip }}
                  📊 Respuesta: {{ media_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
      
      # ========== ERROR - ACCIÓN DESCONOCIDA ==========
      default:
        - variables:
            media_result: "{{ media_result | combine({'status': 'error', 'error': 'Acción desconocida: ' + action}, recursive=True) }}"
        
        - action: notify.notify
          data:
            title: "❌ Error en adb_media"
            message: |
              Acción desconocida: {{ action }}
              Usa: play, pause o exit
