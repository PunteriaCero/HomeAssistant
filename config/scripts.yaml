    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    command:
      description: 'Comando ADB a ejecutar (requerido para: command)'
      example: pm list packages
  sequence:
    # ========== VALIDACIÓN INICIAL ==========
    - condition: template
      value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
    
    - condition: template
      value_template: '{{ action is defined and action | length > 0 }}'
    
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        system_result:
          timestamp: "{{ now() }}"
          action: "{{ action }}"
          device_ip: "{{ device_ip }}"
          status: "pending"
          response: {}
          error: null
    
    # ========== EJECUTAR ACCIÓN ==========
    - choose:
        # ========== SCREENSHOT ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "screenshot" }}'
          sequence:
            - action: rest_command.adb_screenshot
              data:
                device_ip: '{{ device_ip }}'
              response_variable: screenshot_result
            
            - variables:
                system_result: "{{ system_result | combine({'status': 'completed', 'response': screenshot_result.json if screenshot_result.json else screenshot_result.content}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📸 Captura de pantalla"
                message: |
                  ✅ Acción: SCREENSHOT
                  📍 Dispositivo: {{ device_ip }}
                  📊 Respuesta: {{ system_result.response | to_json | truncate(100) }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== COMMAND (Comando personalizado) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "command" }}'
          sequence:
            - condition: template
              value_template: '{{ command is defined and command | length > 0 }}'
            
            - action: rest_command.adb_custom_command
              data:
                device_ip: '{{ device_ip }}'
                command: '{{ command }}'
              response_variable: command_result
            
            - variables:
                system_result: "{{ system_result | combine({'status': 'completed', 'command': command, 'response': command_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "💻 Comando ejecutado"
                message: |
                  ✅ Acción: COMMAND
                  📍 Dispositivo: {{ device_ip }}
                  🔧 Comando: {{ command }}
                  📊 Resultado: {{ system_result.response | to_json | truncate(150) }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
      
      # ========== ERROR - ACCIÓN DESCONOCIDA ==========
      default:
        - variables:
            system_result: "{{ system_result | combine({'status': 'error', 'error': 'Acción desconocida: ' + action}, recursive=True) }}"
        
        - action: notify.notify
          data:
            title: "❌ Error en adb_system"
            message: |
              Acción desconocida: {{ action }}
              Usa: screenshot o command
