play_urbana:
  alias: Play Urbana
  description: ''
  sequence:
  - variables:
      contador: 0
  - type: turn_on
    device_id: fc7f4860e492c881ee2935dc5da1dd19
    entity_id: 99bbbbdbabccb38e814a87d5caf0e1da
    domain: switch
  - repeat:
      sequence:
      - variables:
          contador: '{{ contador | int + 1 }}'
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
      until:
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ contador | int >= 30 }}'
        - condition: not
          conditions:
          - condition: state
            entity_id: media_player.comedor
            state: unavailable
  - condition: and
    conditions:
    - condition: template
      value_template: '{{ contador | int < 30 }}'
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 0.06
    target:
      device_id: 48a0ff0c7d8ef9066b797c9ba519d264
  - action: media_player.play_media
    target:
      entity_id: media_player.comedor
    data:
      media_content_id: media-source://radio_browser/78ae7b0c-cd9f-42d5-847d-6a41b578bb97
      media_content_type: audio/aac
    metadata:
      title: Urbana Play 104.4
      thumbnail: ''
      media_class: music
      children_media_class:
      navigateIds:
      - {}
      - media_content_type: app
        media_content_id: media-source://radio_browser
      - media_content_type: music
        media_content_id: media-source://radio_browser/country/AR
  - variables:
      contador: 0
  - repeat:
      sequence:
      - variables:
          contador: '{{ contador | int + 1 }}'
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
      until:
      - condition: or
        conditions:
        - condition: template
          value_template: '{{ contador | int >= 20 }}'
        - condition: state
          entity_id: media_player.comedor
          state: playing
          for:
            hours: 0
            minutes: 0
            seconds: 10
  fields: {}
