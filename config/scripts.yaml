adb_device:
  alias: "ADB Device - Gestión de dispositivos"
  description: "Gestión de dispositivos ADB (conectar, desconectar, listar, estado) con retorno JSON"
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - connect
          - disconnect
          - list
          - status
          - health
      default: status
    device_ip:
      description: 'IP del dispositivo (requerido para: connect, disconnect, status)'
      example: 192.168.0.161
      default: 192.168.0.161
    port:
      description: 'Puerto (opcional, default: 5555 para connect)'
      example: 5555
  sequence:
    # ========== VALIDACIÓN INICIAL ==========
    - condition: template
      value_template: '{{ action is defined and action | length > 0 }}'
    
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        device_result:
          timestamp: "{{ now() }}"
          action: "{{ action }}"
          device_ip: "{{ device_ip }}"
          status: "pending"
          response: {}
          error: null
    
    # ========== EJECUTAR ACCIÓN ==========
    - choose:
        # ========== CONNECT ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "connect" }}'
          sequence:
            - condition: template
              value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
            
            - action: rest_command.adb_connect_device
              data:
                device_ip: '{{ device_ip }}'
              response_variable: connect_result
            
            - variables:
                device_result: "{{ device_result | combine({'status': 'completed', 'response': connect_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🔌 Dispositivo conectado"
                message: |
                  ✅ Acción: CONNECT
                  📍 IP: {{ device_ip }}
                  📊 Respuesta: {{ device_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== DISCONNECT ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "disconnect" }}'
          sequence:
            - condition: template
              value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
            
            - action: rest_command.adb_disconnect_device
              data:
                device_ip: '{{ device_ip }}'
              response_variable: disconnect_result
            
            - variables:
                device_result: "{{ device_result | combine({'status': 'completed', 'response': disconnect_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "❌ Dispositivo desconectado"
                message: |
                  ✅ Acción: DISCONNECT
                  📍 IP: {{ device_ip }}
                  📊 Respuesta: {{ device_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== LIST ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "list" }}'
          sequence:
            - action: rest_command.adb_list_devices
              response_variable: list_result
            
            - variables:
                device_result: "{{ device_result | combine({'status': 'completed', 'response': list_result.json, 'count': list_result.json | length}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📋 Dispositivos listados"
                message: |
                  ✅ Acción: LIST
                  📊 Total: {{ device_result.count }} dispositivo(s)
                  📋 Respuesta: {{ device_result.response | to_json | truncate(200) }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== STATUS ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "status" }}'
          sequence:
            - condition: template
              value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
            
            - action: rest_command.adb_check_status
              data:
                device_ip: '{{ device_ip }}'
              response_variable: status_result
            
            - variables:
                device_result: "{{ device_result | combine({'status': 'completed', 'response': status_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📊 Estado del dispositivo"
                message: |
                  ✅ Acción: STATUS
                  📍 IP: {{ device_ip }}
                  🟢 Estado: {{ device_result.response.status | default('N/A') }}
                  📊 Respuesta: {{ device_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== HEALTH ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "health" }}'
          sequence:
            - action: rest_command.adb_health
              response_variable: health_result
            
            - variables:
                device_result: "{{ device_result | combine({'status': 'completed', 'response': health_result.json if health_result.json else health_result.content}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "💚 API Health Check"
                message: |
                  ✅ Acción: HEALTH
                  🟢 API Status: {{ device_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
      
      # ========== ERROR - ACCIÓN DESCONOCIDA ==========
      default:
        - variables:
            device_result: "{{ device_result | combine({'status': 'error', 'error': 'Acción desconocida: ' + action}, recursive=True) }}"
        
        - action: notify.notify
          data:
            title: "❌ Error en adb_device"
            message: |
              Acción desconocida: {{ action }}
              Usa: connect, disconnect, list, status o health
adb_info:
  alias: "ADB Info - Información del dispositivo"
  description: "Información del dispositivo (info, app actual, apps instaladas, logs) con retorno JSON"
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - info
          - current_app
          - installed_apps
          - logcat
      default: current_app
    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    limit:
      description: 'Límite de apps (para installed_apps, default: 30)'
      example: 30
    lines:
      description: 'Número de líneas de log (para logcat, default: 50)'
      example: 50
  sequence:
    # ========== VALIDACIÓN INICIAL ==========
    - condition: template
      value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
    
    - condition: template
      value_template: '{{ action is defined and action | length > 0 }}'
    
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        info_result:
          timestamp: "{{ now() }}"
          action: "{{ action }}"
          device_ip: "{{ device_ip }}"
          status: "pending"
          response: {}
          error: null
    
    # ========== EJECUTAR ACCIÓN ==========
    - choose:
        # ========== INFO ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "info" }}'
          sequence:
            - action: rest_command.adb_device_info
              data:
                device_ip: '{{ device_ip }}'
              response_variable: info_response
            
            - variables:
                info_result: "{{ info_result | combine({'status': 'completed', 'response': info_response.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "ℹ️ Información del dispositivo"
                message: |
                  ✅ Acción: DEVICE INFO
                  📍 IP: {{ device_ip }}
                  📊 Información:
                  {{ info_result.response | to_json | truncate(200) }}
        
        # ========== CURRENT APP ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "current_app" }}'
          sequence:
            - action: rest_command.adb_current_app
              data:
                device_ip: '{{ device_ip }}'
              response_variable: app_response
            
            - variables:
                info_result: "{{ info_result | combine({'status': 'completed', 'response': app_response.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📦 Aplicación actual"
                message: |
                  ✅ Acción: CURRENT APP
                  📍 IP: {{ device_ip }}
                  📦 App: {{ info_result.response.app_name | default('N/A') }}
                  🔗 Package: {{ info_result.response.package_name | default('N/A') }}
                  📊 Completo: {{ info_result.response | to_json }}
        
        # ========== INSTALLED APPS ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "installed_apps" }}'
          sequence:
            - action: rest_command.adb_installed_apps
              data:
                device_ip: '{{ device_ip }}'
              response_variable: apps_response
            
            - variables:
                info_result: "{{ info_result | combine({'status': 'completed', 'response': apps_response.json, 'count': apps_response.json | length}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📚 Aplicaciones instaladas"
                message: |
                  ✅ Acción: INSTALLED APPS
                  📍 IP: {{ device_ip }}
                  📚 Total: {{ info_result.count }} aplicaciones
                  📋 Primeras 5:
                  {% for app in info_result.response[:5] %}
                  • {{ app.name | default(app.package | default('N/A')) }}
                  {% endfor %}
                  📊 Respuesta completa: {{ info_result.response | to_json | truncate(150) }}
        
        # ========== LOGCAT ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "logcat" }}'
          sequence:
            - action: rest_command.adb_logcat
              data:
                device_ip: '{{ device_ip }}'
                lines: '{{ lines | default(50) }}'
              response_variable: log_response
            
            - variables:
                info_result: "{{ info_result | combine({'status': 'completed', 'lines': lines | default(50), 'response': log_response.json, 'count': log_response.json | length}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "📝 Logs del sistema"
                message: |
                  ✅ Acción: LOGCAT
                  📍 IP: {{ device_ip }}
                  📝 Líneas: {{ info_result.count }} captured
                  📊 Primeras líneas:
                  {% for line in info_result.response[:3] %}
                  {{ line | truncate(50) }}
                  {% endfor %}
      
      # ========== ERROR - ACCIÓN DESCONOCIDA ==========
      default:
        - variables:
            info_result: "{{ info_result | combine({'status': 'error', 'error': 'Acción desconocida: ' + action}, recursive=True) }}"
        
        - action: notify.notify
          data:
            title: "❌ Error en adb_info"
            message: |
              Acción desconocida: {{ action }}
              Usa: info, current_app, installed_apps o logcat
adb_volume:
  alias: "ADB Volume - Control de volumen"
  description: "Control de volumen (get, up, down, set, mute) con retorno de respuestas JSON"
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - get
          - up
          - down
          - set
          - mute
      default: get
    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    steps:
      description: 'Pasos para up/down (default: 1) o nivel para set (0-15)'
      example: 1
  sequence:
    # ========== VALIDACIÓN INICIAL ==========
    - condition: template
      value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
    
    - condition: template
      value_template: '{{ action is defined and action | length > 0 }}'
    
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        volume_result:
          timestamp: "{{ now() }}"
          action: "{{ action }}"
          device_ip: "{{ device_ip }}"
          status: "pending"
          response: {}
          error: null
    
    # ========== EJECUTAR ACCIÓN ==========
    - choose:
        # ========== GET (Obtener volumen actual) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "get" }}'
          sequence:
            - action: rest_command.adb_volume_current
              data:
                device_ip: '{{ device_ip }}'
              response_variable: get_result
            
            - variables:
                volume_result: "{{ volume_result | combine({'status': 'completed', 'response': get_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🔊 Volumen actual"
                message: |
                  ✅ Acción: GET VOLUME
                  📍 Dispositivo: {{ device_ip }}
                  🔊 Nivel: {{ volume_result.response.level | default('N/A') }}/15
                  📊 Completo: {{ volume_result.response | to_json }}
        
        # ========== UP (Aumentar volumen) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "up" }}'
          sequence:
            - action: rest_command.adb_volume_up
              data:
                device_ip: '{{ device_ip }}'
                steps: '{{ steps | default(1) }}'
              response_variable: up_result
            
            - variables:
                volume_result: "{{ volume_result | combine({'status': 'completed', 'steps': steps | default(1), 'response': up_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🔊 Volumen aumentado"
                message: |
                  ✅ Acción: VOLUME UP
                  📍 Dispositivo: {{ device_ip }}
                  ➕ Pasos: {{ steps | default(1) }}
                  🔊 Nuevo nivel: {{ volume_result.response.level | default('N/A') }}/15
                  📊 Respuesta: {{ volume_result.response | to_json }}
        
        # ========== DOWN (Disminuir volumen) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "down" }}'
          sequence:
            - action: rest_command.adb_volume_down
              data:
                device_ip: '{{ device_ip }}'
                steps: '{{ steps | default(1) }}'
              response_variable: down_result
            
            - variables:
                volume_result: "{{ volume_result | combine({'status': 'completed', 'steps': steps | default(1), 'response': down_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🔇 Volumen disminuido"
                message: |
                  ✅ Acción: VOLUME DOWN
                  📍 Dispositivo: {{ device_ip }}
                  ➖ Pasos: {{ steps | default(1) }}
                  🔊 Nuevo nivel: {{ volume_result.response.level | default('N/A') }}/15
                  📊 Respuesta: {{ volume_result.response | to_json }}
        
        # ========== SET (Establecer nivel exacto) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "set" }}'
          sequence:
            - condition: template
              value_template: '{{ steps is defined and steps | int(0) >= 0 and steps | int(0) <= 15 }}'
            
            - action: rest_command.adb_volume_set
              data:
                device_ip: '{{ device_ip }}'
                level: '{{ steps }}'
              response_variable: set_result
            
            - variables:
                volume_result: "{{ volume_result | combine({'status': 'completed', 'level': steps, 'response': set_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🎚️ Volumen establecido"
                message: |
                  ✅ Acción: VOLUME SET
                  📍 Dispositivo: {{ device_ip }}
                  🎚️ Nivel fijado: {{ steps }}/15
                  📊 Respuesta: {{ volume_result.response | to_json }}
        
        # ========== MUTE (Silenciar) ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "mute" }}'
          sequence:
            - action: rest_command.adb_volume_mute
              data:
                device_ip: '{{ device_ip }}'
              response_variable: mute_result
            
            - variables:
                volume_result: "{{ volume_result | combine({'status': 'completed', 'response': mute_result.json}, recursive=True) }}"
            
            - action: notify.notify
              data:
                title: "🔕 Dispositivo silenciado"
                message: |
                  ✅ Acción: VOLUME MUTE
                  📍 Dispositivo: {{ device_ip }}
                  🔕 Estado: Silenciado
                  📊 Respuesta: {{ volume_result.response | to_json }}
      
      # ========== ERROR - ACCIÓN DESCONOCIDA ==========
      default:
        - variables:
            volume_result: "{{ volume_result | combine({'status': 'error', 'error': 'Acción desconocida: ' + action}, recursive=True) }}"
        
        - action: notify.notify
          data:
            title: "❌ Error en adb_volume"
            message: |
              Acción desconocida: {{ action }}
              Usa: get, up, down, set o mute
adb_media:
  alias: "ADB Media - Control de reproducción"
  description: "Control de medios (play, pause, exit) con retorno de respuestas JSON"
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - play
          - pause
          - exit
      default: play
    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    video_url:
      description: 'URL de video (requerido para: play)'
      example: https://www.youtube.com/watch?v=VIDEO_ID
  sequence:
    # ========== VALIDACIÓN INICIAL ==========
    - condition: template
      value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
    
    - condition: template
      value_template: '{{ action is defined and action | length > 0 }}'
    
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        media_result:
          timestamp: "{{ now() }}"
          action: "{{ action }}"
          device_ip: "{{ device_ip }}"
          status: "pending"
          response: {}
          error: null
    
    # ========== EJECUTAR ACCIÓN ==========
    - choose:
        # ========== PLAY ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "play" }}'
          sequence:
            - condition: template
              value_template: '{{ video_url is defined and video_url | length > 0 }}'
            
            - action: rest_command.adb_play_video
              data:
                device_ip: '{{ device_ip }}'
                video_url: '{{ video_url }}'
