adb_device:
  description: Gestión de dispositivos ADB (conectar, desconectar, listar, estado)
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - connect
          - disconnect
          - list
          - status
          - health
      default: status
    device_ip:
      description: 'IP del dispositivo (requerido para: disconnect, status)'
      example: 192.168.0.161
      default: 192.168.0.161
    port:
      description: 'Puerto (opcional, default: 5555 para connect)'
      example: 5555
  sequence:
  - condition: template
    value_template: '{{ action is defined and action | length > 0 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ action == ''connect'' }}'
      sequence:
      - condition: template
        value_template: '{{ ip is defined and ip | length > 0 }}'
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_connect_device
      - data:
          message: 'Conectando a {{ device_ip }}: {{ result.status }}'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''disconnect'' }}'
      sequence:
      - condition: template
        value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_disconnect_device
      - data:
          message: 'Desconectando {{ device_ip }}: {{ result.status }}'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''list'' }}'
      sequence:
      - response_variable: result
        action: rest_command.adb_list_devices
      - data:
          message: 'Dispositivos listados: {{ result.json | length }} dispositivos'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''status'' }}'
      sequence:
      - condition: template
        value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_check_status
      - data:
          message: 'Estado: {{ result.json.status | default(''desconocido'') }}'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''health'' }}'
      sequence:
      - response_variable: result
        action: rest_command.adb_health
      - data:
          message: 'API Status: {{ result.json.status | default(''OK'') }}'
        action: notify.notify
    default:
    - data:
        message: 'ERROR adb_device: Acción ''{{ action }}'' desconocida. Use: connect,
          disconnect, list, status o health'
      action: notify.notify
adb_info:
  description: Información del dispositivo (info, app actual, apps instaladas, logs)
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - info
          - current_app
          - installed_apps
          - logcat
      default: current_app
    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    limit:
      description: 'Límite de apps (para installed_apps, default: 30)'
      example: 30
    lines:
      description: 'Número de líneas de log (para logcat, default: 50)'
      example: 50
  sequence:
  - condition: template
    value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
  - condition: template
    value_template: '{{ action is defined and action | length > 0 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ action == ''info'' }}'
      sequence:
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_device_info
      - data:
          message: 'Info: {{ result.json | to_json }}'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''current_app'' }}'
      sequence:
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_current_app
      - data:
          message: 'App actual: {{ result.json.app_name | default(''N/A'') }}'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''installed_apps'' }}'
      sequence:
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_installed_apps
      - data:
          message: 'Instaladas: {{ result.json | length }} apps'
        action: notify.notify
    - conditions:
      - condition: template
        value_template: '{{ action == ''logcat'' }}'
      sequence:
      - data:
          device_ip: '{{ device_ip }}'
        response_variable: result
        action: rest_command.adb_logcat
      - data:
          message: 'Logcat obtenido: {{ result.json | length }} líneas'
        action: notify.notify
    default:
    - data:
        message: 'ERROR adb_info: Acción ''{{ action }}'' desconocida. Use: info,
          current_app, installed_apps o logcat'
      action: notify.notify
adb_volume:
  description: Control de volumen (get, up, down, set, mute)
  fields:
    action:
      description: Acción a realizar
      selector:
        select:
          options:
          - get
          - up
          - down
          - set
          - mute
      default: get
    device_ip:
      description: IP del dispositivo Android
      example: 192.168.0.161
      default: 192.168.0.161
    steps:
      description: 'Pasos para up/down (default: 1) o nivel para set (0-15)'
      example: 1
  sequence:
  - condition: template
    value_template: '{{ device_ip is defined and device_ip | length > 0 }}'
  - condition: template
    value_template: '{{ action is defined and action | length > 0 }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ action == ''get'' }}'
      sequence:
      - service: rest_command.adb_volume_current
        data:
          device_ip: '{{ device_ip }}'
        response_variable: result
      - service: notify.notify
        data:
          message: 'Volumen: {{ result.json.level | default(''N/A'') }}/15'
    - conditions:
      - condition: template
        value_template: '{{ action == ''up'' }}'
      sequence:
      - service: rest_command.adb_volume_up
        data:
          device_ip: '{{ device_ip }}'
          steps: '{{ steps | default(1) }}'
        response_variable: result
      - service: notify.notify
        data:
          message: Volumen +{{ steps | default(1) }} → {{ result.json.level | default('N/A')
            }}
    - conditions:
      - condition: template
        value_template: '{{ action == ''down'' }}'
      sequence:
      - service: rest_command.adb_volume_down
        data:
          device_ip: '{{ device_ip }}'
          steps: '{{ steps | default(1) }}'
        response_variable: result
      - service: notify.notify
        data:
          message: Volumen -{{ steps | default(1) }} → {{ result.json.level | default('N/A')
            }}
    - conditions:
      - condition: template
        value_template: '{{ action == ''set'' }}'
      sequence:
      - condition: template
        value_template: '{{ steps is defined and steps | int(0) >= 0 and steps | int(0)
          <= 15 }}'
      - service: rest_command.adb_volume_set
        data:
          device_ip: '{{ device_ip }}'
          level: '{{ steps }}'
        response_variable: result
      - service: notify.notify
        data:
          message: 'Volumen fijado a {{ steps }}/15: {{ result.json.status | default(''OK'')
            }}'
    - conditions:
      - condition: template
        value_template: '{{ action == ''mute'' }}'
      sequence:
      - service: rest_command.adb_volume_mute
        data:
          device_ip: '{{ device_ip }}'
        response_variable: result
      - service: notify.notify
        data:
          message: 'Silenciado: {{ result.json.status | default(''OK'') }}'
    default:
    - service: notify.notify
      data:
        message: 'ERROR adb_volume: Acción ''{{ action }}'' desconocida. Use: get,
          up, down, set o mute'
adb_media:
