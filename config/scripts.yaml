        value_template: '{{ action == ''exit'' }}'
      sequence:
      - service: rest_command.adb_exit_app
        data:
          device_ip: '{{ device_ip }}'
        response_variable: result
      - service: notify.notify
        data:
          message: 'Cerrada: {{ result.json.status | default(''OK'') }}'
    default:
    - service: notify.notify
