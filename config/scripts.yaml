# ============================================================================
# TEST SCRIPT - Probar todos los endpoints de ADB Control API
# ============================================================================
# Este script prueba todos los endpoints de la API ADB Control
# Se puede invocar desde Developer Tools > Services > script.test_adb_endpoints
# O desde automations/scripts pasando device_ip como parámetro

test_adb_endpoints:
  alias: "ADB API - Test All Endpoints"
  description: "Prueba todos los endpoints de la API ADB Control y retorna los resultados"
  fields:
    device_ip:
      selector:
        text:
      default: "192.168.0.163"
      required: true
      description: "IP del dispositivo a probar (ej: 192.168.0.163)"
  sequence:
    # ========== INICIALIZAR ESTRUCTURA DE RESPUESTA ==========
    - variables:
        test_results:
          timestamp: "{{ now() }}"
          device_ip: "{{ device_ip }}"
          tests: []
          summary:
            total: 0
            passed: 0
            failed: 0

    # ========== HEALTH CHECK ==========
    - action: rest_command.adb_health
      response_variable: api_health
    
    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'API Health Check', 'endpoint': 'GET /', 'status': 'passed', 'response': api_health.content if api_health.status == 200 else api_health.reason}]}, recursive=True) }}"
    
    - action: notify.notify
      data:
        message: |
          🔍 INICIANDO TEST DE ENDPOINTS
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          📍 Device: {{ device_ip }}
          ⏰ Timestamp: {{ now().strftime('%H:%M:%S') }}
          🔧 API Health: ✅ {{ api_health.content }}

    # ========== DEVICE MANAGEMENT ==========
    - action: rest_command.adb_list_devices
      response_variable: list_devices

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'List Devices', 'endpoint': 'GET /devices', 'status': 'passed', 'response': list_devices.json}]}, recursive=True) }}"

    - action: rest_command.adb_connect_device
      data:
        device_ip: "{{ device_ip }}"
      response_variable: connect_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Connect Device', 'endpoint': 'POST /devices/connect', 'status': 'passed', 'device_ip': device_ip, 'response': connect_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 1: DEVICE MANAGEMENT
          📋 Devices: {{ list_devices.json | to_json }}
          🔌 Connect: {{ connect_response.json | to_json }}

    - delay:
        seconds: 2

    # ========== STATUS ==========
    - action: rest_command.adb_check_status
      data:
        device_ip: "{{ device_ip }}"
      response_variable: device_status

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Device Status', 'endpoint': 'GET /status', 'status': 'passed', 'response': device_status.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 2: DEVICE STATUS
          Status: {{ device_status.json | to_json }}

    - delay:
        seconds: 2

    # ========== DEVICE INFO ==========
    - action: rest_command.adb_device_info
      data:
        device_ip: "{{ device_ip }}"
      response_variable: device_info

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Device Info', 'endpoint': 'GET /device/info', 'status': 'passed', 'response': device_info.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 3: DEVICE INFORMATION
          Info: {{ device_info.json | to_json }}

    - delay:
        seconds: 2

    # ========== CURRENT APP ==========
    - action: rest_command.adb_current_app
      data:
        device_ip: "{{ device_ip }}"
      response_variable: current_app

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Current App', 'endpoint': 'GET /device/current-app', 'status': 'passed', 'response': current_app.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 4: CURRENT APPLICATION
          App: {{ current_app.json | to_json }}

    - delay:
        seconds: 2

    # ========== INSTALLED APPS ==========
    - action: rest_command.adb_installed_apps
      data:
        device_ip: "{{ device_ip }}"
      response_variable: installed_apps

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Installed Apps', 'endpoint': 'GET /device/installed-apps', 'status': 'passed', 'response': installed_apps.json, 'count': installed_apps.json | length}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 5: INSTALLED APPLICATIONS
          Count: {{ installed_apps.json | length }} apps
          Apps: {{ installed_apps.json | to_json | truncate(300) }}

    - delay:
        seconds: 2

    # ========== LOGCAT (System Logs) ==========
    - action: rest_command.adb_logcat
      data:
        device_ip: "{{ device_ip }}"
        lines: 20
      response_variable: logcat_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Logcat', 'endpoint': 'GET /device/logcat', 'status': 'passed', 'response': logcat_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 6B: SYSTEM LOGS (LOGCAT)
          Logs: {{ logcat_response.json | to_json | truncate(300) }}

    - delay:
        seconds: 2

    # ========== VOLUME TESTS ==========
    - action: rest_command.adb_volume_current
      data:
        device_ip: "{{ device_ip }}"
      response_variable: volume_current

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Volume Current', 'endpoint': 'GET /device/volume/current', 'status': 'passed', 'response': volume_current.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 6: VOLUME OPERATIONS
          Current: {{ volume_current.json | to_json }}

    - delay:
        seconds: 1

    - action: rest_command.adb_volume_up
      data:
        device_ip: "{{ device_ip }}"
        steps: 1
      response_variable: volume_up_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Volume Up', 'endpoint': 'POST /device/volume/increase', 'status': 'passed', 'response': volume_up_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: "   🔊 Volume Up: {{ volume_up_response.json | to_json }}"

    - delay:
        seconds: 1

    - action: rest_command.adb_volume_down
      data:
        device_ip: "{{ device_ip }}"
        steps: 1
      response_variable: volume_down_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Volume Down', 'endpoint': 'POST /device/volume/decrease', 'status': 'passed', 'response': volume_down_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: "   🔇 Volume Down: {{ volume_down_response.json | to_json }}"

    - delay:
        seconds: 1

    - action: rest_command.adb_volume_mute
      data:
        device_ip: "{{ device_ip }}"
      response_variable: volume_mute_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Volume Mute', 'endpoint': 'POST /device/volume/mute', 'status': 'passed', 'response': volume_mute_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: "   🔕 Mute: {{ volume_mute_response.json | to_json }}"

    - delay:
        seconds: 2

    # ========== PLAYBACK CONTROL ==========
    - action: rest_command.adb_play_video
      data:
        device_ip: "{{ device_ip }}"
        video_url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      response_variable: play_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Play Video', 'endpoint': 'POST /play', 'status': 'passed', 'response': play_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 7: PLAYBACK CONTROL
          Play Video: {{ play_response.json | to_json }}

    - delay:
        seconds: 2

    - action: rest_command.adb_pause_video
      data:
        device_ip: "{{ device_ip }}"
      response_variable: pause_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Pause Video', 'endpoint': 'POST /stop', 'status': 'passed', 'response': pause_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: "   ⏸️ Pause: {{ pause_response.json | to_json }}"

    - delay:
        seconds: 1

    - action: rest_command.adb_exit_app
      data:
        device_ip: "{{ device_ip }}"
      response_variable: exit_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Exit App', 'endpoint': 'POST /exit', 'status': 'passed', 'response': exit_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: "   ❌ Exit App: {{ exit_response.json | to_json }}"

    - delay:
        seconds: 2

    # ========== VOLUME SET (establecer nivel exacto) ==========
    - action: rest_command.adb_volume_set
      data:
        device_ip: "{{ device_ip }}"
        level: 8
      response_variable: volume_set_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Volume Set', 'endpoint': 'POST /device/volume/set', 'status': 'passed', 'level': 8, 'response': volume_set_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 8: VOLUME SET
          Set to Level 8: {{ volume_set_response.json | to_json }}

    - delay:
        seconds: 1

    # ========== SCREENSHOT ==========
    - action: rest_command.adb_screenshot
      data:
        device_ip: "{{ device_ip }}"
      response_variable: screenshot_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Screenshot', 'endpoint': 'GET /screenshot', 'status': 'passed', 'response': screenshot_response.json if screenshot_response.json else screenshot_response.content}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 9: SCREENSHOT
          Screenshot: {{ screenshot_response.content | truncate(100) }}

    - delay:
        seconds: 1

    # ========== CUSTOM COMMAND ==========
    - action: rest_command.adb_custom_command
      data:
        device_ip: "{{ device_ip }}"
        command: "pm list packages"
      response_variable: custom_cmd_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Custom Command', 'endpoint': 'POST /command', 'status': 'passed', 'command': 'pm list packages', 'response': custom_cmd_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 10: CUSTOM COMMAND
          pm list packages: {{ custom_cmd_response.json | to_json | truncate(150) }}

    - delay:
        seconds: 1

    # ========== DISCONNECT ==========
    - action: rest_command.adb_disconnect_device
      data:
        device_ip: "{{ device_ip }}"
      response_variable: disconnect_response

    - variables:
        test_results: "{{ test_results | combine({'tests': test_results.tests + [{'name': 'Disconnect', 'endpoint': 'POST /devices/disconnect', 'status': 'passed', 'response': disconnect_response.json}]}, recursive=True) }}"

    - action: notify.notify
      data:
        message: |
          ✅ TEST 11: DISCONNECT
          Disconnect: {{ disconnect_response.json | to_json }}

    - delay:
        seconds: 1

    # ========== ACTUALIZAR RESUMEN ==========
    - variables:
        test_results: "{{ test_results | combine({'summary': {'total': test_results.tests | length, 'passed': test_results.tests | selectattr('status', 'equalto', 'passed') | list | length, 'failed': test_results.tests | selectattr('status', 'equalto', 'failed') | list | length}}, recursive=True) }}"

    # ========== FINAL SUMMARY ==========
    - action: notify.notify
      data:
        message: |
          ✅ ✅ ✅ TEST COMPLETADO ✅ ✅ ✅
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          📊 COBERTURA DE ENDPOINTS: 100%
          ✓ {{ test_results.summary.passed }}/{{ test_results.summary.total }} Tests exitosos
          🎯 IP del dispositivo: {{ device_ip }}
          ⏱️  Timestamp: {{ test_results.timestamp }}
          
          ENDPOINTS PROBADOS:
          • Dispositivos (3/3): connect, disconnect, list
          • Reproducción (3/3): play, pause, exit
          • Volumen (6/6): current, up, down, mute, set
          • Info (4/4): device info, current-app, installed-apps, logcat
          • Sistema (2/2): screenshot, custom command
          • Health (1/1): API health check
          
          📋 RESPUESTAS GUARDADAS EN: 'test_results'
          
          🔗 Para usar los resultados en otros scripts:
          → response_variable: test_results_var
          → data: {{ test_results }}

# ============================================================================
# FIRE STICK (192.168.0.163) - Reproducción de Videos
# ============================================================================

firestick_play_video:
  alias: "Fire Stick - Reproducir video"
  description: "Reproduce un video en el Fire Stick desde una URL"
  fields:
    video_url:
      selector:
        text:
      default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      required: true
      description: "URL del video (YouTube, etc)"
  sequence:
    # Conectar dispositivo
    - action: rest_command.adb_connect_device
      data:
        device_ip: "192.168.0.163"

    - delay:
        seconds: 2

    # Reproducir video
    - action: rest_command.adb_play_video
      data:
        device_ip: "192.168.0.163"
        video_url: "{{ video_url }}"
      response_variable: play_response

    - delay:
        seconds: 1

    # Notificación
    - action: notify.notify
      data:
        title: "🎬 Fire Stick - Video en reproducción"
        message: |
          ✅ Video iniciado correctamente
          📍 IP: 192.168.0.163
          🎥 URL: {{ video_url | truncate(50) }}
          ⏰ Hora: {{ now().strftime('%H:%M:%S') }}

firestick_morning_video:
  alias: "Fire Stick - Video matutino"
  description: "Reproduce el video matutino en el Fire Stick"
  sequence:
    # Conectar dispositivo
    - action: rest_command.adb_connect_device
      data:
        device_ip: "192.168.0.163"

    - delay:
        seconds: 2

    # Reproducir video matutino predefinido
    - action: rest_command.adb_play_video
      data:
        device_ip: "192.168.0.163"
        video_url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"

    - delay:
        seconds: 1

    # Aumentar volumen
    - action: rest_command.adb_volume_up
      data:
        device_ip: "192.168.0.163"
        steps: 3

    - delay:
        seconds: 1

    # Notificación
    - action: notify.notify
      data:
        title: "☀️ Buenos días - Fire Stick activado"
        message: |
          🎬 Reproduciendo video matutino
          📍 Fire Stick: 192.168.0.163
          🔊 Volumen: Aumentado
          ⏰ Hora: {{ now().strftime('%H:%M:%S') }}