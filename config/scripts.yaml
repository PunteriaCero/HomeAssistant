            - variables:
                media_result: "{{ media_result | combine({'status': 'completed', 'action': 'play', 'video_url': video_url, 'response': play_result.json}, recursive=True) }}"
            
            - delay:
                seconds: 2
            
            - action: notify.notify
              data:
                title: "🎬 Reproducción iniciada"
                message: |
                  ✅ Acción: {{ media_result.action | upper }}
                  📍 Dispositivo: {{ media_result.device_ip }}
                  🎥 Video: {{ video_url | truncate(50) }}
                  📊 Respuesta: {{ media_result.response | to_json }}
                  ⏰ Hora: {{ now().strftime('%H:%M:%S') }}
        
        # ========== PAUSE ==========
        - conditions:
            - condition: template
              value_template: '{{ action == "pause" }}'
          sequence:
